<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/library.js" defer></script>
    <title>Odin Library</title>
</head>
<body>
    <div class="menu">
        <h1>Odin Library</h1>
        <button command="show-modal" commandfor="add-book" type="submit">
            <img class="svg" src="images/book-open-variant.svg">Add Book
        </button>
    </div>
    <dialog id="add-book">
        <form>
            <legend>Book Details</legend>
            <p class="inputs">
                <label for="author">Author: </label>
                <input type="text" id="author" name="author">
            </p>
            <p class="inputs">
                <label for="title">Title: </label>
                <input type="text" id="title" name="title">
            </p>
            <p class="inputs">
                <label for="pages">Number of pages: </label>
                <input type="text" id="pages" name="pages">
            </p>
            <p class="inputs">
                <label for="read">Read (Yes or No): </label>
                <input type="text" id="read" name="read">
            </p>  
        </form>
        <div class="dialog-buttons">
            <button id="confirm-add-book" type="submit">Add Book</button>
            <button commandfor="add-book" command="close">Close</button>
        </div>
    </dialog>
    <div class="booklist">

    </div>
</body>
</html>
